# This file is part of the tschm/.config-templates repository
# (https://github.com/tschm/.config-templates).
#
# GitLab CI/CD Configuration
# Purpose: This configuration defines the CI/CD pipeline for GitLab
#          to ensure code quality and compatibility across different environments.

stages:
  - sync
  - setup
  - lint
  - test
  - build
  - docs
  - release

variables:
  PYTHON_VERSION: "3.12"

include:
  local: .gitlab/ci-templates/*.yml

# Public job that can be triggered manually
sync-config-templates:
  stage: sync
  extends: ".sync-config-templates"
  rules:
    - when: manual

# -----------------------------
# Setup Template
# -----------------------------
.setup_template: &setup_template
  before_script:
    - pip install uv
    - curl -sL https://taskfile.dev/install.sh | sh
    - mv ./bin/task /usr/local/bin/task
    - |
      if [ -f "pyproject.toml" ]; then
        export PYPROJECT_EXISTS=true
      else
        export PYPROJECT_EXISTS=false
      fi
    - uv venv --python $PYTHON_VERSION
    - |
      if [ "$PYPROJECT_EXISTS" = "true" ]; then
        uv sync --all-extras
      else
        echo "No pyproject.toml found, skipping package installation"
      fi

# -----------------------------
# Setup Job
# -----------------------------
setup:
  stage: setup
  image: python:$PYTHON_VERSION
  <<: *setup_template
  script:
    - echo "Environment setup complete"
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

# -----------------------------
# Lint Job
# -----------------------------
lint:
  stage: lint
  image: python:$PYTHON_VERSION
  needs:
    - setup
  dependencies:
    - setup
  <<: *setup_template
  script:
    - task quality:lint
    - task quality:fmt

# -----------------------------
# Test Jobs
# -----------------------------
.test_template: &test_template
  stage: test
  <<: *setup_template
  script:
    - uv pip install pytest
    - uv run pytest tests

test:python-3.11:
  <<: *test_template
  image: python:3.11

test:python-3.12:
  <<: *test_template
  image: python:3.12

test:python-3.13:
  <<: *test_template
  image: python:3.13

# -----------------------------
# Build Job
# -----------------------------
build:
  stage: build
  image: python:$PYTHON_VERSION
  needs:
    - test:python-3.11
    - test:python-3.12
    - test:python-3.13
  <<: *setup_template
  script:
    - task build:build
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# -----------------------------
# Docs Job
# -----------------------------
pages:
  stage: docs
  image: python:$PYTHON_VERSION
  needs:
    - lint
    - test:python-3.12
  <<: *setup_template
  script:
    - task docs:docs
    - task docs:test
    - task docs:marimushka
    - task docs:book
    - mkdir -p public
    - cp -r _book/* public/ || echo "No _book directory found"
    - cp -r book/_build/* public/ || echo "No book/_build directory found"
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# -----------------------------
# Release Jobs
# -----------------------------
release:tag:
  stage: release
  image: python:$PYTHON_VERSION
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

release:build:
  stage: release
  image: python:$PYTHON_VERSION
  needs:
    - job: release:tag
      optional: true
  <<: *setup_template
  script:
    - |
      if [ -f "pyproject.toml" ]; then
        version=${CI_COMMIT_TAG#v}
        echo "Setting version to $version"
        sed -i.bak "s/^version = .*/version = \"$version\"/" pyproject.toml
        rm pyproject.toml.bak
        task build:build
      else
        echo "No pyproject.toml found, skipping build"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

release:pypi:
  stage: release
  image: python:$PYTHON_VERSION
  needs:
    - job: release:build
      optional: true
  script:
    - |
      if [ -d "dist" ]; then
        pip install twine
        twine upload dist/*
      else
        echo "No dist directory found, skipping PyPI publish"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PROJECT_NAMESPACE == $CI_PROJECT_ROOT_NAMESPACE
